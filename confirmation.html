<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Confirmed - Foodie Express</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --primary: #fc8019;
      --success: #22c55e;
      --background: #fef9f4;
      --text-dark: #333;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--background);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      overflow: hidden;
    }

    .confirmation-card {
      background: #fff;
      border-radius: 25px;
      box-shadow: var(--shadow);
      padding: 40px 30px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      animation: zoomIn 0.5s ease;
    }

    @keyframes zoomIn {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .emoji {
      font-size: 60px;
      margin-bottom: 10px;
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      80% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    h1 {
      color: var(--success);
      font-size: 28px;
      margin-bottom: 10px;
    }

    .details {
      font-size: 16px;
      color: var(--text-dark);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .thumb-img {
      width: 100px;
      margin-bottom: 20px;
      animation: bounce 1s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    a.button {
      display: inline-block;
      padding: 14px 25px;
      background-color: var(--primary);
      color: white;
      text-decoration: none;
      font-weight: 600;
      border-radius: 12px;
      transition: background-color 0.3s ease;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(252,128,25, 0.5); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(252,128,25, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(252,128,25, 0); }
    }

    @media (max-width: 500px) {
      .confirmation-card {
        padding: 30px 20px;
      }

      .emoji {
        font-size: 48px;
      }

      .thumb-img {
        width: 80px;
      }
    }
  </style>
</head>
<body>

  <div class="confirmation-card">
    <div class="emoji">🎉</div>
    <img src="https://cdn-icons-png.flaticon.com/512/845/845646.png" alt="Thumbs Up" class="thumb-img">
    <h1>Order Confirmed!</h1>
    <div class="details" id="orderDetails">
      Preparing your order...
    </div>
    <a class="button" href="order-history.html">View Order History</a>
  </div>

  <script>
    // 1. Show confetti
    const showConfetti = () => {
      const end = Date.now() + 2 * 1000;
      const interval = setInterval(() => {
        if (Date.now() > end) return clearInterval(interval);
        confetti({
          particleCount: 60,
          spread: 70,
          origin: { x: Math.random(), y: Math.random() * 0.6 }
        });
      }, 200);
    };
    showConfetti();

    // 2. Extract order from cart (if available), save to orderHistory
    const cart = JSON.parse(localStorage.getItem("cart") || "[]");
    if (cart.length > 0) {
      const orderHistory = JSON.parse(localStorage.getItem("orderHistory") || "[]");
      const newOrder = {
        id: Date.now(),
        items: cart,
        date: new Date().toLocaleString(),
        eta: Math.floor(Math.random() * 20) + 20 + " mins" // 20-40 mins
      };
      orderHistory.push(newOrder);
      localStorage.setItem("orderHistory", JSON.stringify(orderHistory));
      localStorage.removeItem("cart");
    }

    // 3. Update confirmation message with ETA & restaurant
    const firstItem = cart[0];
    const restaurant = firstItem?.restaurant || "your favorite restaurant";
    const eta = Math.floor(Math.random() * 20) + 20 + " mins";
    document.getElementById("orderDetails").innerHTML = `
      Thanks for ordering from <strong>${restaurant}</strong>!<br>
      Your delicious meal will be delivered in <strong>${eta}</strong> 🚚🍔
    `;
  </script>

</body>
</html>
